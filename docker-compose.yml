version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: wieczorny_szept_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wieczorny_szept
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wieczorny_szept"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
